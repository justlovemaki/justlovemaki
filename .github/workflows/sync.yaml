name: Sync to Gitee

on:
  # 每天北京时间凌晨 1 点运行 (UTC时间 17:00)
  schedule:
    - cron: '0 17 * * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 增加以下权限声明，允许默认的 GITHUB_TOKEN 推送修改到当前仓库
    permissions:
      contents: write
      
    steps:
      # 1. 检出当前仓库代码
      - name: Checkout repository
        uses: actions/checkout@v4
        # 此处去掉了 token 选项，默认会使用内置的 ${{ github.token }}

      # 2. 写入当前日期到 version 文件
      - name: Update version file
        run: |
          # 获取北京时间日期 (UTC+8) 并写入 version 文件
          TZ="Asia/Shanghai" date +'%Y-%m-%d' > version

      # 3. 提交并推送修改到 GitHub
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add version
          # 仅在文件有变化时提交，避免无意义的构建
          git diff-index --quiet HEAD || git commit -m "chore: update version to $(date +'%Y-%m-%d')"
          git push

      # 4. 同步到 Gitee
      - name: Mirror the Github organization repos to Gitee.
        uses: Yikun/hub-mirror-action@master
        with:
          # 必选：需要同步的源端账户名 (GitHub 用户名)
          src: github/justlovemaki
          # 必选：需要同步到的目的端账户名 (Gitee 用户名)
          dst: gitee/justlovemaki
          # 必选：Gitee 的 SSH 私钥，对应 Secrets 中的 GITEE_PRIVATE_KEY
          dst_key: ${{ secrets.GITEE_PRIVATE_KEY }}
          # 必选：Gitee 的私人令牌，用于创建仓库
          dst_token: ${{ secrets.GITEE_TOKEN }}
          # 可选：GitHub Token，用于获取仓库列表
          src_token: ${{ secrets.GH_TOKEN }}
          
          # 账户类型：user (个人) 或 org (组织)
          account_type: user
          # 是否强制更新 (覆盖 Gitee 上的修改)
          force_update: true
          # 克隆方式
          clone_style: "ssh" 
          lfs: true
          timeout: '1h'
          
          # 过滤选项
          black_list: "imagehub"
