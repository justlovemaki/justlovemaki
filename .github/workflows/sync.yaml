name: Sync to Gitee

on:
  # 每天北京时间凌晨 1 点运行 (UTC时间 17:00)
  schedule:
    - cron: '0 17 * * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      # 1. 检出当前仓库代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 写入当前日期到 version 文件
      - name: Update version file
        run: |
          TZ="Asia/Shanghai" date +'%Y-%m-%d' > version

      # 3. 提交并推送修改到 GitHub
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add version
          git diff-index --quiet HEAD || git commit -m "chore: update version to $(date +'%Y-%m-%d')"
          git push

      # === 步骤 3.5：获取可同步仓库并将其动态生成为静态列表 ===
      - name: List and generate repository list
        id: get-repos # 必须指定 ID，方便下游步骤通过该 ID 获取输出值
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "=========================================================="
          echo "             正在获取可同步的 GitHub 仓库列表...          "
          echo "=========================================================="
          if [ -z "$GH_TOKEN" ]; then
            echo "错误: 未检测到 GH_TOKEN 秘钥，无法获取私有仓库！"
            exit 1
          fi
          
          # 1. 在日志中友好地打印，便于你排查
          gh repo list justlovemaki --limit 100 --json name,isPrivate \
            --jq '.[] | select(.name != "imagehub") | "- \(.name) [\(if .isPrivate then "Private 私有" else "Public 公开" end)]"'
          
          # 2. 动态生成逗号分隔的静态列表，格式例如: "repo1,repo2,repo3"
          # 利用 jq 直接输出 join(",") 后的单行字符串
          REPO_LIST=$(gh repo list justlovemaki --limit 100 --json name --jq '[.[] | select(.name != "imagehub") | .name] | join(",")')
          
          # 3. 将变量输出到 GitHub Step Output，供下游 Step 使用
          echo "repos=$REPO_LIST" >> "$GITHUB_OUTPUT"
          echo "已成功生成静态列表: $REPO_LIST"
          echo "=========================================================="

      # 4. 同步到 Gitee
      - name: Mirror the Github organization repos to Gitee.
        uses: Yikun/hub-mirror-action@master
        with:
          # 必选：需要同步的源端账户名 (GitHub 用户名)
          src: github/justlovemaki
          # 必选：需要同步到的目的端账户名 (Gitee 用户名)
          dst: gitee/justlovemaki
          # 必选：Gitee 的 SSH 私钥，对应 Secrets 中的 GITEE_PRIVATE_KEY
          dst_key: ${{ secrets.GITEE_PRIVATE_KEY }}
          # 必选：Gitee 的私人令牌，用于创建仓库
          dst_token: ${{ secrets.GITEE_TOKEN }}
          
          # 关键改动：动态传入上一步生成并导出的仓库列表
          static_list: ${{ steps.get-repos.outputs.repos }}
          
          # 账户类型：user (个人) 或 org (组织)
          account_type: user
          # 是否强制更新 (覆盖 Gitee 上的修改)
          force_update: true
          # 克隆方式
          clone_style: "ssh" 
          lfs: true
          timeout: '1h'
          
          # 因为我们在生成列表时已经手动排除了 "imagehub"，所以这里的 black_list 
          # 不再是必须的，但保留它也完全没问题（双重保险）
          black_list: "imagehub"
